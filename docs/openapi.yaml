openapi: 3.0.3
info:
  title: TuWebAI Backend API
  version: 1.0.0
  description: Contrato de endpoints publicos del backend Express.
servers:
  - url: http://localhost:5000
    description: Local development
  - url: https://tuwebai-backend.onrender.com
    description: Production

tags:
  - name: Health
  - name: Contact
  - name: Payments
  - name: Public
  - name: Auth
  - name: Users

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Server health information
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: OK }
                  message: { type: string, example: Servidor funcionando correctamente }
                  timestamp: { type: string, format: date-time }

  /contact:
    post:
      tags: [Contact]
      summary: Enviar formulario de contacto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactPayload'
      responses:
        '200':
          description: Contacto aceptado
        '202':
          description: Contacto aceptado con fallback
        '400':
          description: Error de validacion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /consulta:
    post:
      tags: [Contact]
      summary: Enviar formulario de consulta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultaPayload'
      responses:
        '200':
          description: Consulta aceptada
        '202':
          description: Consulta aceptada con fallback
        '400':
          description: Error de validacion

  /api/propuesta:
    post:
      tags: [Public]
      summary: Enviar solicitud de propuesta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposalPayload'
      responses:
        '200':
          description: Propuesta aceptada
        '202':
          description: Propuesta aceptada con fallback
        '400':
          description: Error de validacion

  /newsletter:
    post:
      tags: [Public]
      summary: Suscripcion a newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsletterPayload'
      responses:
        '200':
          description: Suscripcion aceptada
        '202':
          description: Suscripcion aceptada con fallback
        '400':
          description: Error de validacion

  /api/testimonials:
    get:
      tags: [Public]
      summary: Listar testimonials
      responses:
        '200':
          description: Lista de testimonios
    post:
      tags: [Public]
      summary: Crear testimonial (via backend)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestimonialPayload'
      responses:
        '201':
          description: Testimonial creado
        '400':
          description: Error de validacion

  /api/testimonials/{testimonialId}:
    get:
      tags: [Public]
      summary: Obtener testimonial por id
      parameters:
        - in: path
          name: testimonialId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Testimonial
        '404':
          description: No encontrado
    put:
      tags: [Public]
      summary: Actualizar testimonial (requiere API key interna)
      parameters:
        - in: path
          name: testimonialId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestimonialUpdatePayload'
      responses:
        '200':
          description: Testimonial actualizado
        '401':
          description: No autorizado
    delete:
      tags: [Public]
      summary: Eliminar testimonial (requiere API key interna)
      parameters:
        - in: path
          name: testimonialId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Testimonial eliminado
        '401':
          description: No autorizado

  /api/applications:
    post:
      tags: [Public]
      summary: Crear aplicacion (vacantes)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationPayload'
      responses:
        '201':
          description: Aplicacion creada
        '400':
          description: Error de validacion

  /crear-preferencia:
    post:
      tags: [Payments]
      summary: Crear preferencia de Mercado Pago
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [esencial, avanzado, premium]
      responses:
        '200':
          description: Preferencia creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  init_point:
                    type: string
                    example: https://www.mercadopago.com.ar/checkout/v1/redirect?pref_id=...
        '400':
          description: Plan invalido
        '500':
          description: Error interno

  /api/payments/status/{paymentId}:
    get:
      tags: [Payments]
      summary: Obtener estado de pago en Mercado Pago
      parameters:
        - in: path
          name: paymentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Estado de pago
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentStatusResponse'
        '404':
          description: No encontrado

  /webhook/mercadopago:
    post:
      tags: [Payments]
      summary: Webhook de Mercado Pago
      description: Endpoint receptor de eventos de MP. ACK inmediato.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Evento recibido

  /webhook/mercadopago/health:
    get:
      tags: [Payments]
      summary: Health del webhook
      responses:
        '200':
          description: Estado OK

  /api/auth/verify/{token}:
    get:
      tags: [Auth]
      summary: Verificar token de autenticacion
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resultado de verificacion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'

  /api/auth/dev-verify/{email}:
    get:
      tags: [Auth]
      summary: Verificacion manual para desarrollo
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Resultado de verificacion manual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'

  /api/users/{uid}:
    get:
      tags: [Users]
      summary: Obtener perfil de usuario
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Perfil de usuario
    put:
      tags: [Users]
      summary: Upsert de perfil de usuario
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPayload'
      responses:
        '200':
          description: Usuario actualizado

  /api/users/{uid}/preferences:
    get:
      tags: [Users]
      summary: Obtener preferencias de usuario
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preferencias de usuario
    put:
      tags: [Users]
      summary: Actualizar preferencias de usuario
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferencesPayload'
      responses:
        '200':
          description: Preferencias actualizadas

  /api/users/{uid}/project:
    get:
      tags: [Users]
      summary: Obtener proyecto principal del usuario
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proyecto principal o null

  /api/users/{uid}/payments:
    get:
      tags: [Users]
      summary: Obtener pagos del usuario
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de pagos

  /api/users/{uid}/tickets:
    get:
      tags: [Users]
      summary: Obtener tickets del usuario
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de tickets
    post:
      tags: [Users]
      summary: Crear ticket de soporte
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketCreatePayload'
      responses:
        '201':
          description: Ticket creado
        '400':
          description: Error de validacion

  /api/users/{uid}/tickets/{ticketId}:
    put:
      tags: [Users]
      summary: Actualizar ticket de soporte
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketUpdatePayload'
      responses:
        '200':
          description: Ticket actualizado

  /api/users/{uid}/tickets/{ticketId}/responses:
    post:
      tags: [Users]
      summary: Agregar respuesta a ticket
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketResponsePayload'
      responses:
        '200':
          description: Respuesta agregada

  /api/projects/{projectId}:
    put:
      tags: [Users]
      summary: Actualizar proyecto (BFF write path)
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdatePayload'
      responses:
        '200':
          description: Proyecto actualizado

  /api/projects:
    get:
      tags: [Users]
      summary: Obtener todos los proyectos
      responses:
        '200':
          description: Lista de proyectos

  /api/tickets:
    get:
      tags: [Users]
      summary: Obtener todos los tickets
      responses:
        '200':
          description: Lista de tickets

  /api/tickets/{ticketId}:
    get:
      tags: [Users]
      summary: Obtener ticket por id
      parameters:
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ticket
        '404':
          description: No encontrado

components:
  schemas:
    ContactPayload:
      type: object
      required: [name, email, message]
      properties:
        name: { type: string, minLength: 2 }
        email: { type: string, format: email }
        title: { type: string }
        message: { type: string, minLength: 10 }
        source: { type: string }

    ConsultaPayload:
      type: object
      required: [name, email, title, message]
      properties:
        name: { type: string, minLength: 2 }
        email: { type: string, format: email }
        title: { type: string, minLength: 2 }
        message: { type: string, minLength: 10 }

    ProposalPayload:
      type: object
      required: [nombre, email, tipo_proyecto, detalles]
      properties:
        nombre: { type: string, minLength: 2 }
        email: { type: string, format: email }
        tipo_proyecto: { type: string, minLength: 2 }
        servicios: { type: string }
        presupuesto: { type: string }
        plazo: { type: string }
        detalles: { type: string, minLength: 10 }

    NewsletterPayload:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        source: { type: string }

    TestimonialPayload:
      type: object
      required: [name, testimonial]
      properties:
        name: { type: string, minLength: 2 }
        company: { type: string }
        testimonial: { type: string, minLength: 10 }

    TestimonialUpdatePayload:
      type: object
      properties:
        name: { type: string, minLength: 2 }
        company: { type: string, minLength: 2 }
        testimonial: { type: string, minLength: 10 }
        isNew: { type: boolean }
        isApproved: { type: boolean }
        status: { type: string }

    ApplicationPayload:
      type: object
      required: [name, email, position, department, type]
      properties:
        name: { type: string, minLength: 2 }
        email: { type: string, format: email }
        phone: { type: string }
        experience: { type: string }
        portfolio: { type: string }
        message: { type: string }
        position: { type: string, minLength: 2 }
        department: { type: string, minLength: 2 }
        type: { type: string, minLength: 2 }

    PaymentStatusResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            id: { type: string }
            status: { type: string }
            status_detail: { type: string }
            transaction_amount: { type: number }
            currency_id: { type: string }
            date_approved: { type: string, format: date-time }
            payment_method_id: { type: string }

    AuthVerifyResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }

    UserPayload:
      type: object
      properties:
        email: { type: string, format: email }
        username: { type: string }
        name: { type: string }
        image: { type: string }
        role: { type: string }
        isActive: { type: boolean }
        projectId: { type: string }

    UserPreferencesPayload:
      type: object
      properties:
        emailNotifications: { type: boolean }
        newsletter: { type: boolean }
        darkMode: { type: boolean }
        language: { type: string }

    TicketCreatePayload:
      type: object
      required: [userId, subject, message]
      properties:
        userId: { type: string }
        subject: { type: string }
        message: { type: string }
        status:
          type: string
          enum: [open, in-progress, resolved]
        priority:
          type: string
          enum: [low, medium, high]
        responses:
          type: array
          items:
            type: object

    TicketUpdatePayload:
      type: object
      properties:
        subject: { type: string }
        message: { type: string }
        status:
          type: string
          enum: [open, in-progress, resolved]
        priority:
          type: string
          enum: [low, medium, high]
        responses:
          type: array
          items:
            type: object

    TicketResponsePayload:
      type: object
      required: [message, author, authorType]
      properties:
        message: { type: string }
        author: { type: string }
        authorType:
          type: string
          enum: [client, admin]
        createdAt:
          type: string
          format: date-time

    ProjectUpdatePayload:
      type: object
      properties:
        userId: { type: string }
        name: { type: string }
        type: { type: string }
        startDate: { type: string }
        estimatedEndDate: { type: string }
        overallProgress: { type: number, minimum: 0, maximum: 100 }
        status:
          type: string
          enum: [active, completed, on-hold]
        phases:
          type: array
          items:
            type: object

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean }
        error: { type: string }
        message: { type: string }
        errors:
          type: array
          items:
            type: object

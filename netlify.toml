[build]
  command = "export SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES=\"$VITE_FIREBASE_API_KEY,$VITE_FIREBASE_APP_ID,$VITE_FIREBASE_MEASUREMENT_ID,$VITE_FIREBASE_MESSAGING_SENDER_ID,$VITE_FIREBASE_PROJECT_ID,$VITE_FIREBASE_AUTH_DOMAIN,$VITE_FIREBASE_STORAGE_BUCKET\" && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/image_perfil.jpg"
  to = "/image_perfil.jpg"
  status = 200

[[headers]]
  for = "/image_perfil.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000" 

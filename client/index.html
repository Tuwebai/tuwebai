  <body>
    <div id="root">
      <div
        id="initial-skeleton"
        style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, #0a0a0f, #121320);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      "
      >
        <div
          style="
          font-family: 'Rajdhani', sans-serif;
          font-size: 3rem;
          background: linear-gradient(to right, #00CCFF, #9933FF);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          margin-bottom: 1rem;
        "
        >
          TuWeb.ai
        </div>
        <div
          style="
          width: 200px;
          height: 4px;
          background: rgba(255,255,255,0.1);
          border-radius: 2px;
          overflow: hidden;
        "
        >
          <div
            style="
            width: 40%;
            height: 100%;
            background: linear-gradient(to right, #00CCFF, #9933FF);
            animation: skeleton-pulse 1.5s ease-in-out infinite;
          "
          ></div>
        </div>
      </div>
    </div>
    <style>
      @keyframes skeleton-pulse {
        0%,
        100% {
          transform: translateX(-100%);
        }
        50% {
          transform: translateX(250%);
        }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var adsenseLoaded = false;
        var hostname = window.location.hostname;
        var isLocalEnvironment =
          hostname === "localhost" ||
          hostname === "127.0.0.1" ||
          hostname === "[::1]";

        function loadScript(src, attrs) {
          var script = document.createElement("script");
          script.src = src;
          script.async = true;
          if (attrs) {
            Object.keys(attrs).forEach(function (key) {
              script.setAttribute(key, attrs[key]);
            });
          }
          document.head.appendChild(script);
          return script;
        }

        function loadAnalyticsAndAds() {
          if (isLocalEnvironment) {
            return;
          }

          if (!adsenseLoaded) {
            adsenseLoaded = true;
            loadScript(
              "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4693865721377675",
              { crossorigin: "anonymous" },
            );
          }
        }

        function scheduleDeferredLoad() {
          if ("requestIdleCallback" in window) {
            window.requestIdleCallback(loadAnalyticsAndAds, { timeout: 4000 });
          } else {
            setTimeout(loadAnalyticsAndAds, 2500);
          }
        }

        var events = ["pointerdown", "keydown", "scroll", "visibilitychange"];
        var triggered = false;

        function triggerLoad() {
          if (triggered) return;
          triggered = true;
          events.forEach(function (eventName) {
            window.removeEventListener(eventName, triggerLoad, { passive: true });
          });
          loadAnalyticsAndAds();
        }

        events.forEach(function (eventName) {
          window.addEventListener(eventName, triggerLoad, { passive: true, once: true });
        });

        scheduleDeferredLoad();
      })();
    </script>
  </body>
